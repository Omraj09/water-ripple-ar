<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Water Ripple AR Experience (Multi-Frame)</title>
  
  <script>
    // Disable createImageBitmap unconditionally to bypass iOS 17 WebGL memory leaks
    window.createImageBitmap = undefined;
    console.log("WebGL Stability: Disabled window.createImageBitmap.");
  </script>
  
  <!-- A-Frame and MindAR.js Libraries -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

    :root {
      --bg-gradient: linear-gradient(135deg, #090714 0%, #150f2e 50%, #050308 100%);
      --accent-color: #00f0ff;
      --accent-glow: 0 0 25px rgba(0, 240, 255, 0.55);
      --text-primary: #ffffff;
      --text-secondary: #a0aec0;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Outfit', sans-serif;
      background-color: #000;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Safari video decoder workaround: Overrides A-Frame's default asset hiding
       so WebKit keeps hardware decoding enabled, while A-Frame's asset loader remains happy */
    a-assets {
      display: block !important;
      position: fixed;
      top: 0;
      left: 0;
      width: 16px;
      height: 9px;
      opacity: 0.01;
      pointer-events: none;
      z-index: -1;
    }
    
    a-assets video {
      display: block !important;
      width: 16px;
      height: 9px;
    }

    /* Custom Premium Loading Screen */
    #custom-loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-gradient);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 1;
      visibility: visible;
      transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.8s cubic-bezier(0.25, 1, 0.5, 1);
    }

    #custom-loading.fade-out {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 40px 30px;
      max-width: 380px;
      width: 90%;
      text-align: center;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .title {
      font-size: 26px;
      font-weight: 800;
      margin: 25px 0 8px 0;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ffffff 30%, var(--accent-color) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 300;
      line-height: 1.6;
      margin-bottom: 35px;
    }

    /* Water Ripple Loading Animation */
    .ripple-container {
      position: relative;
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ripple-circle {
      position: absolute;
      border: 2px solid var(--accent-color);
      opacity: 0;
      border-radius: 50%;
      animation: ripple 3s cubic-bezier(0.1, 0.8, 0.3, 1) infinite;
      box-shadow: var(--accent-glow);
    }

    .ripple-circle:nth-child(2) {
      animation-delay: 1s;
    }

    .ripple-circle:nth-child(3) {
      animation-delay: 2s;
    }

    .droplet-icon {
      width: 22px;
      height: 22px;
      background: var(--accent-color);
      border-radius: 0 50% 50% 50%;
      transform: rotate(45deg);
      box-shadow: var(--accent-glow);
      z-index: 10;
      animation: float 2.5s ease-in-out infinite;
    }

    @keyframes ripple {
      0% {
        width: 0px;
        height: 0px;
        opacity: 0.8;
      }
      100% {
        width: 100px;
        height: 100px;
        opacity: 0;
      }
    }

    @keyframes float {
      0%, 100% {
        transform: rotate(45deg) translate(0, 0);
      }
      50% {
        transform: rotate(45deg) translate(-3px, -3px);
      }
    }

    .status-text {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: var(--accent-color);
      font-weight: 600;
      margin-top: 25px;
      animation: pulse 1.5s infinite alternate;
    }

    /* Premium Start Button */
    #start-btn {
      margin-top: 25px;
      padding: 14px 35px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 800;
      color: #090714;
      background: var(--accent-color);
      border: none;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: var(--accent-glow);
      transition: transform 0.2s ease, opacity 0.4s ease, background-color 0.3s ease;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: buttonPulse 2s infinite;
      z-index: 10000;
    }

    #start-btn:active {
      transform: scale(0.95);
    }

    #start-btn.hidden {
      opacity: 0;
      pointer-events: none;
      display: none;
    }

    @keyframes buttonPulse {
      0% { box-shadow: 0 0 0 0 rgba(0, 240, 255, 0.7); }
      70% { box-shadow: 0 0 0 15px rgba(0, 240, 255, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 240, 255, 0); }
    }

    @keyframes pulse {
      0% { opacity: 0.4; }
      100% { opacity: 1; }
    }

    .instructions {
      margin-top: 25px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.45);
      line-height: 1.5;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding-top: 20px;
      width: 100%;
    }

    /* Custom Scanning Overlay UI */
    #custom-scanning-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1000;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 1;
      transition: opacity 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    }

    #custom-scanning-overlay.hidden {
      opacity: 0;
    }

    .scanner-frame {
      width: 255px; /* 3:4 Aspect Ratio */
      height: 340px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(0, 240, 255, 0.015);
      border-radius: 16px;
      position: relative;
      box-shadow: inset 0 0 25px rgba(0, 240, 255, 0.06);
    }

    .corner {
      position: absolute;
      width: 24px;
      height: 24px;
      border: 3px solid var(--accent-color);
    }

    .top-left {
      top: -2px;
      left: -2px;
      border-right: none;
      border-bottom: none;
      border-top-left-radius: 16px;
    }

    .top-right {
      top: -2px;
      right: -2px;
      border-left: none;
      border-bottom: none;
      border-top-right-radius: 16px;
    }

    .bottom-left {
      bottom: -2px;
      left: -2px;
      border-right: none;
      border-top: none;
      border-bottom-left-radius: 16px;
    }

    .bottom-right {
      bottom: -2px;
      right: -2px;
      border-left: none;
      border-top: none;
      border-bottom-right-radius: 16px;
    }

    .scanner-line {
      position: absolute;
      width: 100%;
      height: 3px;
      background: linear-gradient(to right, transparent, var(--accent-color), transparent);
      box-shadow: var(--accent-glow);
      top: 0;
      animation: scan 3.5s ease-in-out infinite;
    }

    @keyframes scan {
      0% { top: 0%; }
      50% { top: 100%; }
      100% { top: 0%; }
    }

    .scan-text {
      margin-top: 30px;
      font-size: 13px;
      color: #ffffff;
      font-weight: 500;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
      letter-spacing: 1px;
      text-align: center;
      background: rgba(8, 6, 17, 0.7);
      padding: 10px 22px;
      border-radius: 30px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      animation: pulse 1.5s infinite alternate;
    }
  </style>
  
  <script>
    // System log window for mobile debugging (Always Visible)
    function logErrorToScreen(msg) {
      const consoleDiv = document.querySelector('#debug-console');
      if (consoleDiv) {
        const errEl = document.createElement('div');
        errEl.style.margin = '4px 0';
        errEl.innerText = `> ${msg}`;
        consoleDiv.appendChild(errEl);
        consoleDiv.scrollTop = consoleDiv.scrollHeight;
      }
    }

    window.onerror = function (message, url, lineNo, colNo, error) {
      logErrorToScreen(`JS ERR: ${message} (Line ${lineNo}:${colNo})`);
      return false;
    };

    const _error = console.error;
    console.error = function (...args) {
      _error.apply(console, args);
      if (args[0] && typeof args[0] === 'string' && args[0].includes('useLegacyLights')) return;
      logErrorToScreen(`ERR: ${args.join(' ')}`);
    };

    const _warn = console.warn;
    console.warn = function (...args) {
      _warn.apply(console, args);
      if (args[0] && typeof args[0] === 'string' && args[0].includes('useLegacyLights')) return;
      logErrorToScreen(`WARN: ${args.join(' ')}`);
    };

    // State machine to track active targets
    const activeTargets = new Set();
    const playPromises = {};

    // Safely plays video elements on iOS WebKit avoiding concurrency exceptions
    function safePlayVideo(video, targetId) {
      if (!video) return;
      if (playPromises[targetId]) return;

      const attemptPlay = () => {
        playPromises[targetId] = video.play();
        playPromises[targetId].then(() => {
          playPromises[targetId] = null;
          logErrorToScreen(`Video ${targetId} playing successfully.`);
        }).catch(err => {
          playPromises[targetId] = null;
          logErrorToScreen(`ERR: Video ${targetId} play blocked: ${err.name} - ${err.message}`);
        });
      };

      if (video.readyState >= 1) {
        attemptPlay();
      } else {
        logErrorToScreen(`Video ${targetId} downloading (readyState ${video.readyState})...`);
        const playOnLoad = () => {
          if (activeTargets.has(targetId)) {
            attemptPlay();
          }
          video.removeEventListener('canplay', playOnLoad);
        };
        video.addEventListener('canplay', playOnLoad);
      }
    }

    // Safely pauses video elements by ensuring play promises have resolved first
    function safePauseVideo(video, targetId) {
      if (!video) return;

      const promise = playPromises[targetId];
      if (promise) {
        promise.then(() => {
          if (!activeTargets.has(targetId)) {
            video.pause();
            logErrorToScreen(`Video ${targetId} safely paused.`);
          }
        }).catch(() => {});
        playPromises[targetId] = null;
      } else if (!video.paused) {
        video.pause();
        logErrorToScreen(`Video ${targetId} paused.`);
      }
    }

    // A-Frame component to handle video tracking sync and visibility dynamically
    AFRAME.registerComponent('video-controller', {
      schema: {
        videoSelector: {type: 'string'},
        targetId: {type: 'int'}
      },
      init: function () {
        // Log initialization check to verify A-Frame parsed targets properly
        logErrorToScreen(`Controller init: target ${this.data.targetId} linking to ${this.data.videoSelector}`);
        
        const video = document.querySelector(this.data.videoSelector);
        const scanningOverlay = document.querySelector('#custom-scanning-overlay');

        // On target found: safely trigger playback, hide scanning overlay
        this.el.addEventListener('targetFound', () => {
          logErrorToScreen(`Target ${this.data.targetId} Found!`);
          activeTargets.add(this.data.targetId);
          safePlayVideo(video, this.data.targetId);
          
          if (scanningOverlay) {
            scanningOverlay.classList.add('hidden');
          }
        });

        // On target lost: safely pause playback, restore overlay if all targets lost
        this.el.addEventListener('targetLost', () => {
          logErrorToScreen(`Target ${this.data.targetId} Lost.`);
          activeTargets.delete(this.data.targetId);
          safePauseVideo(video, this.data.targetId);
          
          if (activeTargets.size === 0 && scanningOverlay) {
            scanningOverlay.classList.remove('hidden');
          }
        });
      }
    });

    // Window-level AR engine listeners
    document.addEventListener('DOMContentLoaded', () => {
      logErrorToScreen("DOM fully loaded. Initializing systems.");
      
      const sceneEl = document.querySelector('a-scene');
      const loadingScreen = document.querySelector('#custom-loading');
      const statusText = document.querySelector('.status-text');
      const startBtn = document.querySelector('#start-btn');
      const scanningOverlay = document.querySelector('#custom-scanning-overlay');

      // Show start button when engine is ready
      sceneEl.addEventListener('arReady', (event) => {
        logErrorToScreen("arReady: MindAR Engine fully initialized.");
        if (statusText) statusText.innerText = "ENGINE READY";
        if (startBtn) startBtn.classList.remove('hidden');
      });

      // Handle setup errors gracefully
      sceneEl.addEventListener('arError', (event) => {
        logErrorToScreen(`arError: MindAR Engine failed. Detail: ${JSON.stringify(event.detail || event)}`);
        if (statusText) {
          statusText.innerText = "Camera initialization failed";
          statusText.style.color = "#ff4e4e";
          statusText.style.animation = "none";
        }
      });

      // Helper function to safely unlock video element media state
      function unlockVideo(video) {
        if (!video) return;
        logErrorToScreen(`Checking lock status for ${video.id}`);
        
        if (video.readyState >= 1) {
          video.play().then(() => {
            video.pause();
            logErrorToScreen(`Unlocked context for: ${video.id}`);
          }).catch(err => {
            logErrorToScreen(`ERR: Unlock failed for ${video.id}: ${err.message}`);
          });
        } else {
          logErrorToScreen(`Video ${video.id} is buffering... Queueing unlock.`);
          const asyncUnlock = () => {
            video.play().then(() => {
              video.pause();
              logErrorToScreen(`Unlocked context asynchronously for: ${video.id}`);
            }).catch(err => {
              logErrorToScreen(`ERR: Async unlock failed for ${video.id}: ${err.message}`);
            });
            video.removeEventListener('canplay', asyncUnlock);
          };
          video.addEventListener('canplay', asyncUnlock);
        }
      }

      // Handle click/touchstart on the start button to unlock video contexts
      if (startBtn) {
        startBtn.addEventListener('click', () => {
          logErrorToScreen("Start button clicked. Unlocking media engines.");
          
          // Only select overlay videos (ignoring MindAR's camera feed element)
          const videos = [
            document.querySelector('#animation-video-0'),
            document.querySelector('#animation-video-1')
          ];
          
          videos.forEach(unlockVideo);

          // Hide loading overlay to reveal the camera feed
          if (loadingScreen) {
            loadingScreen.classList.add('fade-out');
            logErrorToScreen("Loading overlay faded out.");
          }

          // Show target scanner guide
          if (scanningOverlay) {
            setTimeout(() => {
              scanningOverlay.classList.remove('hidden');
              logErrorToScreen("Scanning overlay displayed.");
            }, 800);
          }
        });
      }
    });
  </script>
</head>
<body>

  <!-- Diagnostic console for mobile debugging (Always Visible) -->
  <div id="debug-console" style="position: fixed; bottom: 0; left: 0; width: 100%; max-height: 150px; overflow-y: auto; background: rgba(0,0,0,0.85); color: #00f0ff; font-family: monospace; font-size: 10px; z-index: 100000; padding: 10px; border-top: 1px solid #ff4e4e; pointer-events: auto;">
    <div style="font-weight: bold; color: #ff4e4e; margin-bottom: 5px;">SYSTEM DIAGNOSTIC LOGS:</div>
  </div>

  <!-- 1. Custom Glassmorphism Loading Screen -->
  <div id="custom-loading">
    <div class="glass-panel">
      <!-- Water Droplet Logo / Loading Spinner -->
      <div class="ripple-container">
        <div class="ripple-circle"></div>
        <div class="ripple-circle"></div>
        <div class="ripple-circle"></div>
        <div class="droplet-icon"></div>
      </div>
      
      <h1 class="title">Water Ripple</h1>
      <p class="subtitle">Augmented Reality Experience</p>
      
      <div class="status-text">INITIALIZING ENGINE...</div>
      
      <!-- Start Button (revealed when arReady) -->
      <button id="start-btn" class="hidden">START AR</button>
      
      <p class="instructions">
        Please allow camera access when prompted and hold your device facing either frame.
      </p>
    </div>
  </div>

  <!-- 2. Custom Target Alignment Guide Overlay -->
  <div id="custom-scanning-overlay" class="hidden">
    <div class="scanner-frame">
      <div class="corner top-left"></div>
      <div class="corner top-right"></div>
      <div class="corner bottom-left"></div>
      <div class="corner bottom-right"></div>
      <div class="scanner-line"></div>
    </div>
    <div class="scan-text">ALIGN FRAME WITHIN GUIDE</div>
  </div>

  <!-- 3. AR Scene Container -->
  <!-- Set maxTrack: 2 to support tracking both targets concurrently -->
  <a-scene 
    mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 2; uiLoading: no; uiError: no; uiScanning: no; filterMinCF: 0.0005; filterBeta: 10;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false"
    loading-screen="enabled: false">
    
    <!-- We place the video elements inside <a-assets>, but use CSS overrides (defined in head) 
         to override display:none to display:block with tiny opacity. This satisfies both A-Frame's asset loading 
         registry and WebKit's hardware decoder visibility checks. -->
    <a-assets>
      <!-- Video 0 points to animation.mp4 -->
      <video 
        id="animation-video-0" 
        src="./animation.mp4" 
        preload="auto" 
        loop="true" 
        autoplay="true" 
        muted 
        playsinline 
        webkit-playsinline>
      </video>
      <!-- Video 1 points to animation1.mp4 -->
      <video 
        id="animation-video-1" 
        src="./animation1.mp4" 
        preload="auto" 
        loop="true" 
        autoplay="true" 
        muted 
        playsinline 
        webkit-playsinline>
      </video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Target 1 (Index 0) -->
    <a-entity mindar-image-target="targetIndex: 0" video-controller="videoSelector: #animation-video-0; targetId: 0">
      <!-- Fits exactly to the 1792 x 2374 target image boundary ratio (1.0 : 1.32478) -->
      <a-video 
        src="#animation-video-0" 
        width="1.0" 
        height="1.32478" 
        position="0 0 0" 
        rotation="0 0 0">
      </a-video>
    </a-entity>

    <!-- Target 2 (Index 1) -->
    <a-entity mindar-image-target="targetIndex: 1" video-controller="videoSelector: #animation-video-1; targetId: 1">
      <!-- Fits to your second target. Adjust height dynamically to match your second target image ratio (height/width) -->
      <a-video 
        src="#animation-video-1" 
        width="1.0" 
        height="1.32478" 
        position="0 0 0" 
        rotation="0 0 0">
      </a-video>
    </a-entity>
    
  </a-scene>
  
</body>
</html>
